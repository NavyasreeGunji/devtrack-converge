version: '3.9'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: convergy
      POSTGRES_USER: convergy_user
      POSTGRES_PASSWORD: convergy_password
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/convergy
      SPRING_DATASOURCE_USERNAME: convergy_user
      SPRING_DATASOURCE_PASSWORD: convergy_password
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  postgres-data:
